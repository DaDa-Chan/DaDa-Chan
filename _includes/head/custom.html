{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Custom typography improvements -->
<style>
  /* Better heading spacing and visual hierarchy */
  .page__content h2 {
    margin-top: 2em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--global-border-color);
  }

  .page__content h3 {
    margin-top: 1.6em;
  }

  .page__content h4 {
    margin-top: 1.3em;
  }

  /* Math display blocks: more breathing room */
  .page__content .MathJax_Display,
  .page__content mjx-container[jax="CHTML"][display="true"] {
    margin: 1.2em 0 !important;
    overflow-x: auto;
    overflow-y: hidden;
  }

  /* Definition/theorem blocks: subtle left border */
  .page__content p > strong:first-child {
    color: var(--global-base-color);
  }

  /* Better list spacing in notes */
  .page__content li {
    margin-bottom: 0.3em;
  }

  .page__content li > ul,
  .page__content li > ol {
    margin-top: 0.3em;
  }

  /* Table styling improvements */
  .page__content table {
    font-size: 0.9em;
    margin: 1.2em 0;
  }

  /* Horizontal rules as section dividers */
  .page__content hr {
    margin: 2.5em 0;
    border: none;
    border-top: 2px solid var(--global-border-color);
  }

  /* ── Course note theorem/definition boxes ── */
  .note-box {
    border-left: 4px solid;
    border-radius: 4px;
    padding: 10px 16px;
    margin: 1.2em 0;
  }
  .note-box .note-label {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
  }
  .note-def  { border-color: #4A90D9; background: #EDF6FF; }
  .note-def  .note-label { color: #2a6faf; }
  .note-thm  { border-color: #E8932A; background: #FFF5E6; }
  .note-thm  .note-label { color: #c07018; }
  .note-prop { border-color: #4CAF50; background: #F0FFF0; }
  .note-prop .note-label { color: #388E3C; }
  .note-rem  { border-color: #9B59B6; background: #F5F0FF; }
  .note-rem  .note-label { color: #7b34a6; }
  .note-err  { border-color: #E74C3C; background: #FFF0F0; }
  .note-err  .note-label { color: #c0392b; }
  .note-ex   { border-color: #888;    background: #F9F9F9; }
  .note-ex   .note-label { color: #555; }
  .note-proof {
    border-left: 3px solid #ccc;
    padding: 6px 14px;
    margin: 0.8em 0;
    color: var(--global-text-color);
  }
  .note-algo {
    border: 1px solid var(--global-border-color);
    background: var(--global-code-background-color);
    padding: 14px 18px;
    margin: 1.2em 0;
    border-radius: 6px;
    font-size: 0.92em;
  }
  .note-algo .algo-title {
    font-weight: bold;
    border-bottom: 1px solid var(--global-border-color);
    padding-bottom: 6px;
    margin-bottom: 10px;
    color: var(--global-base-color);
  }
</style>

<!-- end custom head snippets -->
